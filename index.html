<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Upcoming Games</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 650px;
  margin: 0 auto;
  padding: 20px;
}

h2 {
  margin-bottom: 20px;
}

.game-card {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
  background: #fff;
}

.date {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 6px;
}

.opponent {
  font-size: 15px;
  margin-bottom: 4px;
}

.meta {
  color: #666;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="container">
  <h2>Upcoming Games</h2>
  <div id="schedule"></div>
</div>

<script>
async function loadSchedule() {
  const res = await fetch("https://api.team-manager.gc.com/public/teams/eB5S7ivDuLom/games");
  const games = await res.json();

  const now = new Date();

  const upcoming = games
    .filter(game => new Date(game.start_time) > now)
    .sort((a, b) => new Date(a.start_time) - new Date(b.start_time));

  const container = document.getElementById("schedule");
  container.innerHTML = "";

  if (upcoming.length === 0) {
    container.innerHTML = "<p>No upcoming games scheduled.</p>";
    return;
  }

  upcoming.forEach(game => {
    const date = new Date(game.start_time);

    const card = document.createElement("div");
    card.className = "game-card";

    card.innerHTML = `
      <div class="date">
        ${date.toLocaleDateString()} – ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
      </div>
      <div class="opponent">
        ${game.opponent_name || "Opponent TBD"}
      </div>
      <div class="meta">
        ${game.location_name || ""}
      </div>
    `;

    container.appendChild(card);
  });
}

loadSchedule();
</script>

</body>
</html>
