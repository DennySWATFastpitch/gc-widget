<script>
async function loadSchedule() {
  const res = await fetch("https://api.team-manager.gc.com/public/teams/eB5S7ivDuLom/games");
  const games = await res.json();

  const now = new Date();
  console.log("NOW:", now);

  const container = document.getElementById("schedule");
  container.innerHTML = "";

  games.forEach(game => {
    const start = new Date(game.start_ts);
    console.log("GAME:", game.opponent_team?.name, start);
  });

  const upcoming = games
    .filter(game => {
      const start = new Date(game.start_ts);
      return start.getTime() > now.getTime();
    })
    .sort((a, b) => new Date(a.start_ts) - new Date(b.start_ts));

  console.log("UPCOMING COUNT:", upcoming.length);

  if (upcoming.length === 0) {
    container.innerHTML = "<p>No upcoming games scheduled.</p>";
    return;
  }

  upcoming.forEach(game => {
    const date = new Date(game.start_ts);

    const formattedDate = date.toLocaleDateString(undefined, {
      weekday: "short",
      month: "short",
      day: "numeric"
    });

    const formattedTime = game.is_full_day
      ? "All Day"
      : date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    const card = document.createElement("div");
    card.className = "game-card";

    card.innerHTML = `
      <div class="date">
        ${formattedDate} – ${formattedTime}
      </div>
      <div class="opponent">
        ${game.home_away === "home" ? "vs" : "@"}
        ${game.opponent_team?.name || "TBD"}
      </div>
    `;

    container.appendChild(card);
  });
}

loadSchedule();
</script>
